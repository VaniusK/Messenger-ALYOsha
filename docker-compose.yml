services:
  db:
      image: postgres:16
      env_file:
        - .env
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./server/sql:/docker-entrypoint-initdb.d

  server:
    build: ./server
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - db
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./server/certbot/www:/var/www/certbot:ro
      - ./server/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - server
  
  certbot:
    image: certbot/certbot
    volumes:
      - ./server/certbot/www:/var/www/certbot:rw
      - ./server/certbot/conf:/etc/letsencrypt:rw
    
  client-build:
    build: ./client
    volumes:
      - ./artifacts:/output
    profiles:
      - build

  test-server:
    build: ./server
    command: ["./server_tests"]
    env_file: .env
    depends_on:
      - db
    profiles:
      - test
    environment:
      POSTGRES_DB: messenger_db_test

volumes:
  postgres_data: