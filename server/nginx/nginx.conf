worker_processes auto;

events {
    worker_connections 1024;
}

http {

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=3r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    limit_req_status 429;

    server {
        listen 80;
        server_name localhost api.localhost; # change to domain names on deploy(localhost -> alyosha.su)

        location /.well-known/acme-challencge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    #frontend(for future web-client)
    server {
        listen 443 ssl http2;
        server_name localhost; # change to domain name on deploy(localhost -> alyosha.su)

        ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem; # change to domain name on deploy(localhost -> alyosha.su)
        ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem; # change to domain name on deploy(localhost -> alyosha.su)

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            return 200 "There will be web-client";
            add_header Content-Type text/plain;
        }
    }

    #backend
    server {
        listen 443 ssl http2;
        server_name api.localhost; # change to domain name on deploy(localhost -> alyosha.su)

        ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem; # change to domain name on deploy(localhost -> alyosha.su)
        ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem; # change to domain name on deploy(localhost -> alyosha.su)
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /v1/ {
            proxy_pass http://server:8080;

            limit_req zone=api_limit burst=5 nodelay;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/chat {
            limit_conn conn_limit 5;
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://server:8080;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

}