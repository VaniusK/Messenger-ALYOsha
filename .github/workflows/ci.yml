name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:

  build-client:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache client dependencies
        uses: actions/cache@v4
        with:
          path: build/client/_deps
          key: client-deps-v3-${{ hashFiles('client/CMakeLists.txt') }}
          restore-keys: client-deps-v3-

      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ~/Qt
          key: qt-6.7.3-linux-gcc

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libxcb-xinerama0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-xkb-dev \
            libxcb-cursor0 \
            libxkbcommon-x11-dev \
            libgl-dev \
            libegl1-mesa-dev \
            libssl-dev \
            libglib2.0-dev \
            imagemagick \
            libfuse2

      - name: Install Qt via aqtinstall
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install aqtinstall
          aqt install-qt linux desktop 6.7.3 linux_gcc_64 \
            --outputdir ~/Qt \
            -m qtwebsockets

      - name: Export Qt path
        run: echo "QT_ROOT=$HOME/Qt/6.7.3/gcc_64" >> $GITHUB_ENV

      - name: Build client
        run: |
          cmake -B build/client -S client \
            -DCMAKE_PREFIX_PATH=${{ env.QT_ROOT }} \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/client --parallel

      - name: Test client
        run: ctest --test-dir build/client --output-on-failure

      - name: Download linuxdeploy
        run: |
          wget -c -nv https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -c -nv https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Build AppImage (Portable Linux Executable)
        env:
          QML_SOURCES_PATHS: client/src
          OUTPUT: Messenger-Alesha.AppImage
          QMAKE: ${{ env.QT_ROOT }}/bin/qmake
        run: |
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps/
          convert common/aleshalogo.png -resize 256x256\! AppDir/usr/share/icons/hicolor/256x256/apps/messenger.png

          cat > AppDir/messenger.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Messenger
          Exec=client
          Icon=messenger
          Categories=Network;
          EOF

          CLIENT_BIN=$(find build/client -type f -name "client" -executable | head -n 1)
          if [ -z "$CLIENT_BIN" ]; then echo "Client binary not found!"; exit 1; fi

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable "$CLIENT_BIN" \
            --desktop-file AppDir/messenger.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/messenger.png \
            --plugin qt \
            --output appimage

      - name: Upload Linux AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Messenger-Alesha-Linux
          path: Messenger-Alesha.AppImage

  build-client-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Qt (Windows)
        id: cache-qt-win
        uses: actions/cache@v4
        with:
          path: C:\Qt
          key: qt-6.7.3-windows-msvc2019

      - name: Install Qt via aqtinstall
        if: steps.cache-qt-win.outputs.cache-hit != 'true'
        run: |
          python -m pip install aqtinstall
          aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 `
            --outputdir C:\Qt `
            -m qtwebsockets

      - name: Configure & Build client
        run: |
          cmake -B build/client -S client `
            -DCMAKE_PREFIX_PATH="C:\Qt\6.7.3\msvc2019_64" `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/client --config Release

      - name: Bundle Qt DLLs with windeployqt and copy icon
        run: |
          mkdir deploy
          copy build\client\Release\client.exe deploy\Messenger-Alesha.exe
          C:\Qt\6.7.3\msvc2019_64\bin\windeployqt.exe `
            --qmldir client\src `
            --release `
            --no-translations `
            deploy\Messenger-Alesha.exe
          copy common\aleshalogo.ico deploy\app.ico

      - name: Create Inno Setup installer
        run: |
          $iss = @"
          [Setup]
          AppName=Messenger Alesha
          AppVersion=1.0
          DefaultDirName={autopf}\Messenger-Alesha
          DefaultGroupName=Messenger-Alesha
          OutputDir=installer
          OutputBaseFilename=Messenger-Alesha
          Compression=lzma2
          SolidCompression=yes

          [Files]
          Source: "deploy\*"; DestDir: "{app}"; Flags: recursesubdirs ignoreversion

          [Icons]
          Name: "{group}\Messenger Alesha"; Filename: "{app}\Messenger-Alesha.exe"; IconFilename: "{app}\app.ico"
          Name: "{commondesktop}\Messenger Alesha"; Filename: "{app}\Messenger-Alesha.exe"; IconFilename: "{app}\app.ico"

          [Run]
          Filename: "{app}\Messenger-Alesha.exe"; Description: "Launch Messenger Alesha"; Flags: postinstall
          "@
          $iss | Out-File -Encoding UTF8 messenger.iss
          iscc messenger.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Messenger-Alesha-Windows
          path: installer\Messenger-Alesha.exe
    
  build-client-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Qt (macOS)
        id: cache-qt-mac
        uses: actions/cache@v4
        with:
          path: ~/Qt
          key: qt-6.7.3-macos-clang

      - name: Install Qt via aqtinstall
        if: steps.cache-qt-mac.outputs.cache-hit != 'true'
        run: |
          pipx install aqtinstall
          aqt install-qt mac desktop 6.7.3 clang_64 \
            --outputdir ~/Qt \
            -m qtwebsockets

      - name: Export Qt path
        run: echo "QT_ROOT=$HOME/Qt/6.7.3/macos" >> $GITHUB_ENV

      - name: Build client
        run: |
          cmake -B build/client -S client \
            -DCMAKE_PREFIX_PATH=${{ env.QT_ROOT }} \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/client --parallel

      - name: Bundle with macdeployqt
        run: |
          CLIENT_BIN=$(find build/client -type f -name "client" ! -name "*.dSYM" | head -n 1)
          if [ -z "$CLIENT_BIN" ]; then echo "Client binary not found!"; exit 1; fi

          mkdir -p Messenger-Alesha.app/Contents/MacOS
          mkdir -p Messenger-Alesha.app/Contents/Resources
          cp "$CLIENT_BIN" Messenger-Alesha.app/Contents/MacOS/Messenger-Alesha
          cp common/aleshalogo.png Messenger-Alesha.app/Contents/Resources/

          cat > Messenger-Alesha.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>Messenger-Alesha</string>
            <key>CFBundleIdentifier</key><string>ru.hse.messenger-alesha</string>
            <key>CFBundleName</key><string>Messenger Alesha</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleIconFile</key><string>aleshalogo</string>
          </dict></plist>
          EOF

          ${{ env.QT_ROOT }}/bin/macdeployqt Messenger-Alesha.app \
            -qmldir=client/src

          codesign --deep --force --sign - Messenger-Alesha.app

          hdiutil create -volname "Messenger-Alesha" \
            -srcfolder Messenger-Alesha.app \
            -ov -format UDZO \
            Messenger-Alesha.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Messenger-Alesha-macOS
          path: Messenger-Alesha.dmg

  run-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-17
      - name: Check formatting
        run: |
          FILES=$(find server client common  -path "*/build/*" -prune -o  -path "server/drogon" -prune -o  -path "server/src/bcrypt.cpp" -prune -o  -path "server/src/blowfish.cpp" -prune -o \( -name "*.hpp" -o -name "*.cpp" \) -print 2>/dev/null)
          if [ -n "$FILES" ]; then
            clang-format-17 --dry-run --Werror $FILES
          fi

  docker:
    runs-on: ubuntu-latest
    needs: [build-client, build-client-macos, run-format]
    steps:
      - uses: actions/checkout@v4
      - name: Create test .env
        run: |
          echo "POSTGRES_USER=test_user" >> .env
          echo "POSTGRES_PASSWORD=test_password" >> .env
          echo "POSTGRES_DB=test_db" >> .env
          echo "POSTGRES_HOST=db" >> .env
          echo "JWT_KEY=cool_key_sosite" >> .env
          echo "SERVER_WINDOW_FOR_REQUESTS_SECONDS=10" >> .env
          echo "SERVER_MAX_REQUESTS_PER_WINDOW=1000000" >> .env
          echo "SERVER_IP_LIST_CLEANING_SECONDS_COOLDOWN=60" >> .env
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/bake-action@v5
        with:
          files: docker-compose.yml
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Build client artifact
        run: |
          mkdir -p artifacts
          docker compose --profile build run client-build
      
      - name: Verify client build
        run: |
          ls -la artifacts/
          test -f artifacts/client || (echo "Client binary not found!" && exit 1)
      
      - name: Start services
        run: docker compose up -d
    
      - name: Check services are running
        run: |
          sleep 3
          docker compose ps
          docker compose logs
      
      - name: Run server tests
        run: docker compose run test-server
      
      - name: Cleanup
        run: docker compose down -v